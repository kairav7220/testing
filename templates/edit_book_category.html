{% extends "book_category.html" %}

{% block title %}Edit Category · Library{% endblock %}
{% block heading %}Edit category{% endblock %}

{% block content %}
<main class="panel">
    <div class="panel-head">
        <div>
            <h2><i class="fa-solid fa-pen-to-square"></i> Update category</h2>
        </div>
        <a href="{{ url_for('book_category') }}" class="btn btn-ghost">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </a>
    </div>

    <form class="edit-form" method="POST" action="{{ url_for('edit_book_category', row_num=row_num) }}">
        <div class="form-group">
            <label for="cat_name">
                <i class="fa-solid fa-tag"></i> Category name
            </label>
            <input id="cat_name" type="text" name="cat_name"
                   value="{{ book_cat[2] if book_cat|length > 2 else '' }}" required>
        </div>

        <div class="form-group">
            <label for="description">
                <i class="fa-solid fa-align-left"></i> Description
            </label>
            <input id="description" type="text" name="description"
                   value="{{ book_cat[3] if book_cat|length > 3 else '' }}" required>
        </div>

        <div class="form-group">
            <label for="book_names">
                <i class="fa-solid fa-book"></i> Books
            </label>
            <input id="book_names" type="text" name="book_names"
                   value="{{ book_cat[4] if book_cat|length > 4 else '' }}">
        </div>

        <div class="form-actions">
            <a href="{{ url_for('book_category') }}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">
                <i class="fa-solid fa-floppy-disk"></i> Save changes
            </button>
        </div>
    </form>
</main>
{% endblock %}
