{% extends "book_sell.html" %}

{% block title %}Add Book Sell · Library{% endblock %}
{% block heading %}Add book sell{% endblock %}

{% block content %}
<main class="panel">
    <div class="panel-head">
        <div>
            <h2><i class="fa-solid fa-plus"></i> Add book sell</h2>
        </div>
        <a href="{{ url_for('book_sell') }}" class="btn btn-ghost">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </a>
    </div>

    <form class="edit-form" method="POST" action="{{ url_for('add_book_sell') }}">
        <div class="form-row">
            <div class="form-group">
                <label for="order_date">
                    <i class="fa-solid fa-calendar"></i> Order date
                </label>
                <input id="order_date" type="text" name="order_date" placeholder="e.g. 25-Jan-2026" required>
            </div>

            <div class="form-group">
                <label for="book_id">
                    <i class="fa-solid fa-book"></i> Book ID
                </label>
                <input id="book_id" type="text" name="book_id" placeholder="e.g. BOOK_1" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="book_name">
                    <i class="fa-solid fa-book-open"></i> Book name
                </label>
                <input id="book_name" type="text" name="book_name" required>
            </div>

            <div class="form-group">
                <label for="book_price">
                    <i class="fa-solid fa-dollar-sign"></i> Price
                </label>
                <input id="book_price" type="number" name="book_price" required>
            </div>
        </div>

        <div class="form-group">
            <label for="mem_id">
                <i class="fa-solid fa-user"></i> Member ID
            </label>
            <input id="mem_id" type="text" name="mem_id" placeholder="e.g. MEM_1" required>
        </div>

        <div class="form-actions">
            <a href="{{ url_for('book_sell') }}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>
</main>
{% endblock %}
