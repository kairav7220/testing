{% extends "index.html" %}

{% block title %}Add User · Library{% endblock %}

{% block content %}
<main class="panel">
    <div class="panel-head">
        <div>
            <h2><i class="fa-solid fa-user-plus"></i> Add user</h2>
        </div>
        <a href="{{ url_for('index') }}" class="btn btn-ghost">
            <i class="fa-solid fa-arrow-left"></i>
            Back
        </a>
    </div>

    <form class="edit-form" method="POST" action="{{ url_for('add_user') }}">
        <div class="form-group">
            <label for="username">
                <i class="fa-solid fa-user"></i> Username
            </label>
            <input id="username" type="text" name="username" required>
        </div>

        <div class="form-group">
            <label for="password">
                <i class="fa-solid fa-key"></i> Password
            </label>
            <div class="input-with-toggle">
                <input id="password" type="password" name="password" required>
                <button type="button" class="btn-toggle" id="togglePassword" aria-label="Show password"
                    title="Show or hide password">
                    <i class="fa-solid fa-eye"></i>
                </button>
            </div>
        </div>

        <div class="form-group">
            <label for="phone">
                <i class="fa-solid fa-phone"></i> Phone
            </label>
            <input id="phone" type="tel" name="phone" placeholder="e.g. 9876543210">
        </div>

        <div class="form-actions">
            <a href="{{ url_for('index') }}" class="btn btn-ghost">Cancel</a>
            <button type="submit" class="btn btn-primary">Add</button>
        </div>
    </form>
</main>

<script>
    (function () {
        var btn = document.getElementById('togglePassword');
        var input = document.getElementById('password');
        if (!btn || !input) return;
        btn.addEventListener('click', function () {
            var show = input.type === 'password';
            input.type = show ? 'text' : 'password';
            btn.innerHTML = show
                ? '<i class="fa-solid fa-eye-slash"></i>'
                : '<i class="fa-solid fa-eye"></i>';
        });
    })();
</script>
{% endblock %}
